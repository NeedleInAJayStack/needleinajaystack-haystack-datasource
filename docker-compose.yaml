services:
  grafana:
    platform: 'linux/amd64'
    build:
      args:
        grafana_version: ${GRAFANA_VERSION:-latest}
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
  haxall:
    image: "needleinajaystack/haxall:latest"
    environment:
      - SU_USER=su
      - SU_PASS=su
    ports:
      - 8080:8080/tcp
    volumes:
      - ~/haxall/proj:/opt/haxall/proj
